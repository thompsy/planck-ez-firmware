name: Build Planck EZ firmware

# Builds the keymap in ./keymap against mainline QMK and publishes the .bin
# as a downloadable artifact. Runs on every push and can be started manually
# from the Actions tab (Run workflow). On main, it also updates a rolling
# "latest" GitHub Release with the freshly built .bin (see the release job).

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Check out mainline QMK
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          # Pinned to a known-good mainline commit for reproducible builds.
          # Bump this SHA to pick up newer QMK; re-test the build afterwards.
          ref: c6381000309a8d9300cb1ca8ec01cfa3d4ed4c5f
          submodules: recursive
          path: qmk_firmware

      - name: Check out this layout
        uses: actions/checkout@v4
        with:
          path: layout

      - name: Avoid git "dubious ownership" in container
        run: git config --global --add safe.directory '*'

      - name: Install keymap into the firmware tree
        run: |
          set -eux
          dest="qmk_firmware/keyboards/zsa/planck_ez/keymaps/miryoku_tweaked"
          mkdir -p "$dest"
          cp layout/keymap/* "$dest"/

      - name: Compile zsa/planck_ez/glow:miryoku_tweaked
        working-directory: qmk_firmware
        run: make zsa/planck_ez/glow:miryoku_tweaked

      - name: Collect firmware
        run: |
          set -eux
          mkdir -p out
          # qmk drops the .bin at the firmware repo root
          find qmk_firmware -maxdepth 1 -name '*.bin' -exec cp {} out/ \;
          ls -l out

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: planck_ez_glow_firmware
          path: out/*.bin
          if-no-files-found: error

  # Publishes/updates a rolling "latest" GitHub Release with the built .bin so
  # it can be fetched from a stable location (see flash.sh). Runs on main only,
  # on a clean runner (not the qmk_cli container) where release tooling works
  # reliably. The artifact is handed over from the build job.
  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built firmware
        uses: actions/download-artifact@v4
        with:
          name: planck_ez_glow_firmware
          path: out

      - name: Publish/update the 'latest' rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Planck EZ firmware
          body: |
            Rolling build of the latest `main` firmware.

            Commit: ${{ github.sha }}
          files: out/*.bin
          make_latest: true

